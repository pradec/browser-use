name: Sync fork with upstream

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write  # needed to push to the fork

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/browser-use/browser-use.git || true
          git fetch upstream main

      - name: Merge upstream/main into fork main and push if changed
        shell: bash
        run: |
          set -euo pipefail
          git checkout main
          BEFORE=$(git rev-parse HEAD)
          # Prefer fast-forward; fall back to a merge commit if needed
          if git merge --ff-only upstream/main; then
            echo "Fast-forwarded main to upstream/main"
          else
            echo "Fast-forward not possible; creating merge commit"
            git merge --no-edit upstream/main
          fi
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "Detected new commit(s); pushing to fork main"
            git push origin main
          else
            echo "Fork main already up to date with upstream/main; nothing to push"
          fi
